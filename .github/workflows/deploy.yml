name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_IN_AUTOMATION: "true"

jobs:
  plan:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Select AWS auth mode
        id: auth
        env:
          AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -n "$AWS_ROLE_TO_ASSUME" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
          elif [ -n "$AWS_ACCESS_KEY_ID" ] && [ -n "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "mode=keys" >> "$GITHUB_OUTPUT"
          else
            echo "No AWS credentials configured. Set repository variable AWS_ROLE_TO_ASSUME for OIDC or AWS access key secrets." >&2
            exit 1
          fi

      - name: Configure AWS credentials with OIDC
        if: steps.auth.outputs.mode == 'oidc'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials with access keys
        if: steps.auth.outputs.mode == 'keys'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Initialize Terraform
        run: terraform init

      - name: Check Terraform formatting
        run: terraform fmt -check

      - name: Validate Terraform
        run: terraform validate

      - name: Create Terraform plan
        run: terraform plan -out=tfplan

      - name: Render Terraform plan
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Add plan summary
        run: |
          {
            echo "## Terraform Plan"
            echo
            echo '```'
            sed -n '1,200p' tfplan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Terraform plan artifacts
        uses: actions/upload-artifact@v6
        with:
          name: terraform-plan
          path: |
            terraform/tfplan
            terraform/tfplan.txt
          retention-days: 7

  apply:
    runs-on: ubuntu-latest
    needs: plan
    environment:
      name: production

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Select AWS auth mode
        id: auth
        env:
          AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -n "$AWS_ROLE_TO_ASSUME" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
          elif [ -n "$AWS_ACCESS_KEY_ID" ] && [ -n "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "mode=keys" >> "$GITHUB_OUTPUT"
          else
            echo "No AWS credentials configured. Set repository variable AWS_ROLE_TO_ASSUME for OIDC or AWS access key secrets." >&2
            exit 1
          fi

      - name: Configure AWS credentials with OIDC
        if: steps.auth.outputs.mode == 'oidc'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials with access keys
        if: steps.auth.outputs.mode == 'keys'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Initialize Terraform
        run: terraform init

      - name: Download Terraform plan artifacts
        uses: actions/download-artifact@v6
        with:
          name: terraform-plan
          path: terraform

      - name: Apply Terraform plan
        run: terraform apply -auto-approve tfplan

      - name: Read deployed API endpoint
        id: api
        run: echo "api_url=$(terraform output -raw api_gateway_endpoint)" >> "$GITHUB_OUTPUT"

      - name: Smoke-test deployed API
        working-directory: .
        env:
          API_URL: ${{ steps.api.outputs.api_url }}
        run: python3 test_analyzer.py

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: apply
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Select AWS auth mode
        id: auth
        env:
          AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -n "$AWS_ROLE_TO_ASSUME" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
          elif [ -n "$AWS_ACCESS_KEY_ID" ] && [ -n "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "mode=keys" >> "$GITHUB_OUTPUT"
          else
            echo "No AWS credentials configured." >&2
            exit 1
          fi

      - name: Configure AWS credentials with OIDC
        if: steps.auth.outputs.mode == 'oidc'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials with access keys
        if: steps.auth.outputs.mode == 'keys'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform (to read outputs)
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Initialize Terraform
        working-directory: terraform
        run: terraform init

      - name: Read Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          echo "bucket=$(terraform output -raw frontend_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js static export
        working-directory: frontend
        run: npm run build

      - name: Sync to S3
        run: aws s3 sync frontend/out s3://${{ steps.tf.outputs.bucket }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf.outputs.distribution_id }} \
            --paths "/*"

      - name: Print website URL
        working-directory: terraform
        run: |
          echo "## Frontend deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: $(terraform output -raw frontend_url)" >> "$GITHUB_STEP_SUMMARY"
